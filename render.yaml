services:
  - type: web
    name: cynetwork-pisowifi
    env: node
    rootDir: backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
        sync: false
      - key: SUPABASE_URL
        value: set-in-render-dashboard
        sync: false
      - key: SUPABASE_ANON_KEY
        value: set-in-render-dashboard
        sync: false
      - key: SUPABASE_DB_URL
        value: set-in-render-dashboard
        sync: false
      - key: ACCOUNT_BACKUP_MONGODB_URI
        value: ""
        sync: false
      - key: DATABASE_PATH
        value: /var/data/pisowifi-admin.db
      - key: UPLOADS_DIR
        value: /var/data/package-images
      - key: STARTUP_READY_TIMEOUT_MS
        value: "15000"
      - key: EMAIL_VERIFICATION_ENABLED
        value: "true"
      - key: SMTP_HOST
        value: set-in-render-dashboard
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: set-in-render-dashboard
        sync: false
      - key: SMTP_PASS
        value: set-in-render-dashboard
        sync: false
      - key: SMTP_ALLOW_UNAUTH
        value: "false"
      - key: SMTP_FROM_EMAIL
        value: set-in-render-dashboard
        sync: false
      - key: SMTP_FROM_NAME
        value: CYNETWORK PISOWIFI
      - key: EMAIL_CODE_TTL_MINUTES
        value: "10"
      - key: EMAIL_CODE_RESEND_COOLDOWN_SECONDS
        value: "60"
      - key: EMAIL_CODE_MAX_ATTEMPTS
        value: "5"
    disk:
      name: cynetwork-data
      mountPath: /var/data
      sizeGB: 1

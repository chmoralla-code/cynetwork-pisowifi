services:
  - type: web
    name: cynetwork-pisowifi
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /tmp/pisowifi-admin.db
      - key: UPLOADS_DIR
        value: /tmp/package-images

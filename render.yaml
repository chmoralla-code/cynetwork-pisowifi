services:
  - type: web
    name: cynetwork-pisowifi
    env: node
    rootDir: backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
        sync: false
      - key: ACCOUNT_BACKUP_DATABASE_URL
        fromDatabase:
          name: cynetwork-account-backup
          property: connectionString
      - key: DATABASE_PATH
        value: /var/data/pisowifi-admin.db
      - key: UPLOADS_DIR
        value: /var/data/package-images
    disk:
      name: cynetwork-data
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: cynetwork-account-backup
    databaseName: cynetwork_account_backup
    user: cynetwork_account_backup_user

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PisoWifi Admin - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f0a0a;
            --sidebar-dark: #1a1212;
            --accent: #C83232;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Responsive Sidebar */
        aside {
            width: 260px;
            background: var(--sidebar-dark);
            border-right: 1px solid rgba(200, 50, 50, 0.2);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .logo { font-family: 'Orbitron'; color: var(--accent); font-weight: 900; font-size: 20px; margin-bottom: 50px; }

        nav { flex: 1; }
        nav a {
            display: block;
            color: var(--text-dim);
            text-decoration: none;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.3s;
        }
        nav a:hover, nav a.active { color: var(--accent); }

        /* Main Content */
        main { flex: 1; padding: 50px; overflow-y: auto; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { font-family: 'Orbitron'; letter-spacing: -1px; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #1a1212;
            padding: 25px;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }
        .stat-card h3 { font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
        .stat-card .value { font-size: 28px; font-weight: 900; font-family: 'Orbitron'; }

        /* Chart Area */
        .chart-container {
            background: #1a1212;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 40px;
        }

        /* Data Table */
        .table-container {
            background: #1a1212;
            border-radius: 16px;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; background: rgba(200, 50, 50, 0.1); padding: 15px; font-size: 12px; color: var(--accent); text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-pending { background: rgba(255, 165, 0, 0.2); color: #ffa500; }
        .status-approved { background: rgba(0, 255, 0, 0.2); color: #00ff00; }

        @media (max-width: 900px) {
            .admin-layout { flex-direction: column; }
            aside { width: 100%; border-right: none; border-bottom: 1px solid rgba(200, 50, 50, 0.2); }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside>
            <div class="logo">🌐 PISOWIFI ADMIN</div>
            <nav>
                <a href="#" class="active">OVERVIEW</a>
                <a href="#">ORDERS</a>
                <a href="#">ANALYTICS</a>
                <a href="#">SETTINGS</a>
            </nav>
            <div style="margin-top: auto; font-size: 10px; color: var(--text-dim);">V 1.0.0 SERVERLESS</div>
        </aside>

        <main>
            <div class="header">
                <h1>DASHBOARD</h1>
                <div id="admin-user">ADMIN // CYNETWORK</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Revenue</h3>
                    <div class="value" id="revenue">₱0</div>
                </div>
                <div class="stat-card">
                    <h3>Active Orders</h3>
                    <div class="value" id="totalOrders">0</div>
                </div>
                <div class="stat-card">
                    <h3>Pending Tasks</h3>
                    <div class="value" id="pending">0</div>
                </div>
            </div>

            <div class="chart-container">
                <h3 style="margin-bottom: 20px; font-size: 14px; color: var(--text-dim);">WEEKLY SALES PERFORMANCE</h3>
                <canvas id="salesChart" height="100"></canvas>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Package</th>
                            <th>Status</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table">
                        <!-- Data populated by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // Mock data fetch for demo
        async function loadDashboard() {
            // In real app, fetch from /api/admin/stats
            const stats = {
                revenue: '₱142,500',
                totalOrders: 42,
                pending: 7
            };

            document.getElementById('revenue').innerText = stats.revenue;
            document.getElementById('totalOrders').innerText = stats.totalOrders;
            document.getElementById('pending').innerText = stats.pending;

            // Chart Initialization
            const ctx = document.getElementById('salesChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN'],
                    datasets: [{
                        label: 'Sales (₱)',
                        data: [12000, 19000, 15000, 25000, 22000, 30000, 28000],
                        borderColor: '#C83232',
                        backgroundColor: 'rgba(200, 50, 50, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false },
                        x: { grid: { display: false }, ticks: { color: '#888' } }
                    }
                }
            });

            // Mock Table Data
            const orders = [
                { id: 'CNW-X92F1A', name: 'John Doe', pkg: 'Package 3', status: 'approved', price: '₱12,000' },
                { id: 'CNW-B12G5H', name: 'Alice Smith', pkg: 'Package 1', status: 'pending', price: '₱5,800' },
                { id: 'CNW-K00L9M', name: 'Bob Wilson', pkg: 'Package 2', status: 'approved', price: '₱8,500' },
            ];

            const table = document.getElementById('orders-table');
            orders.forEach(o => {
                const row = `<tr>
                    <td>${o.id}</td>
                    <td>${o.name}</td>
                    <td>${o.pkg}</td>
                    <td><span class="status-badge status-${o.status}">${o.status}</span></td>
                    <td>${o.price}</td>
                </tr>`;
                table.innerHTML += row;
            });
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
